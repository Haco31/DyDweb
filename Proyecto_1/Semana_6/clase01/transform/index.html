<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <!-- la propiedad transform se usa para modificar visualmente un elemento: moverlo, rotarlo, escalarlo o inclinarlo -->
    <!-- 
    mover (translate)
    escalar(scale)
    rotar (rotate)
    inclinar (skew)
    -->

    <div class="container">
      <div class="box move">Mover</div>
      <div class="box scale">Zoom</div>
      <div class="box rotate">Girar</div>
      <div class="box skew">Skew</div>
      <div class="box combo">Combo</div>
    </div>
  </body>
</html>
