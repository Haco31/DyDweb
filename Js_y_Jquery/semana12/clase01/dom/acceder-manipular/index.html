    <h1>Dom</h1>
    <!-- DOM - Document Object Model-->
    <!--
    - Cuando un navegador carga una página web, convierte el código HTML en una estructura de árbol donde cada elemento es un nodo. Este árbol se llama DOM, y permite que los programadores interactúen con la página de manera dinámica. 
    - El DOM es como un mapa o un modelo de toda la página web (HTML), donde puedes ver y modificar todo lo que está en la página, como los elementos (texto, imágenes, botones, etc.), estilos (colores, tamaños), estructuras (listas, tablas), etc.
    - El navegador convierte ese HTML en un DOM que puedes modificar con JavaScript.
    -->
    <!-- 
    Podemos visualizar el DOM como un árbol, donde cada elemento de la página es un nodo:

          Documento (root)
              |
           <html>
        ______|______
       |             |
     <head>        <body>
       |          ____|_______
    <title>     <h1>  <p>  <button>
    
    -->

    <!-- document -->
    <!-- 
    - En JavaScript, document es un objeto global que representa la página web cargada en el navegador. Es la entrada principal para acceder y manipular el DOM.
    - El objeto document es el punto de partida para acceder a los elementos del DOM. Los métodos como getElementById(), querySelector(), createElement(), etc., pertenecen al objeto document, por lo que debemos llamarlo antes de usarlos.
    -->
