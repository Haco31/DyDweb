<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styke.css">
    <title>Product-preview-card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Fraunces:wght@700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>
        <section>
            <figure>
                <img src="./product-preview-card-component-main/images/image-product-desktop.jpg"
                    alt="imagen de un perfume Chanel N°5">
            </figure>
            <article>
                <span>PERFUME</span>
                <h1>Gabrielle Essence Eau de Parfum</h1>
                <p>A floral, solar and voluptuous interpretation composed by Olivier Polge,
                    Perfumer-Creator for the House of CHANEL.</p>
                <p>$149.99</p>
                <p>$169.99</p>
                <button type="button">
                    <img src="./product-preview-card-component-main/images/icon-cart.svg" alt="carrito de compras"> Add
                    to Cart
                </button>
            </article>
        </section>
    </main>
</body>

</html>
