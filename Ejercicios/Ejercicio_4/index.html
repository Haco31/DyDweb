<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tarjeta de resultados de un test">
    <title>Tarjeta de resultados</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <main>
        <article>
            <section>
                <h1>Your Result</h1>
                <div>
                    <p>76</p>
                    <p>of 100</p>
                </div>
                <h2>Great</h2>
                <p>You scored higher than 65% of the people who have taken these tests.</p>
            </section>
            <section>
                <h2>Summary</h2>
                <div>
                    <img src="results-summary-component-main/assets/images/icon-reaction.svg" alt="icono de reaccion">
                    <p>Reaction</p>
                    <p>80 / 100</p>
                </div>
                <div>
                    <img src="results-summary-component-main/assets/images/icon-memory.svg" alt="icono de memoria">
                    <p>Memory</p>
                    <p>92 / 100</p>
                </div>
                <div>
                    <img src="results-summary-component-main/assets/images/icon-verbal.svg" alt="icono de verbal">
                    <p>Verbal</p>
                    <p>61 / 100</p>
                </div>
                <div>
                    <img src="results-summary-component-main/assets/images/icon-visual.svg" alt="icono de visual">
                    <p>Visual</p>
                    <p>72 / 100</p>
                </div>
                <button>Continue</button>
            </section>
        </article>
    </main>
</body>

</html>
